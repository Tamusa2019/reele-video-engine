name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install --upgrade "huggingface_hub[cli]"

      - name: Verify HF_TOKEN is set
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is not set. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "HF_TOKEN is set (length: ${#HF_TOKEN})"

      - name: Sync repo to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== Uploading to HF Space: tamusa2019/reele-video-engine ==="
          hf upload \
            --repo-type space \
            --token "$HF_TOKEN" \
            tamusa2019/reele-video-engine \
            . \
            . \
            --commit-message "sync: from GitHub $GITHUB_SHA" \
            --revision main
          echo "=== Sync complete ==="

      - name: Check Space runtime status
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          curl -sS \
            -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/api/spaces/tamusa2019/reele-video-engine \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('Stage:', d.get('runtime',{}).get('stage')); print('SHA:', (d.get('sha') or '')[:8])"
