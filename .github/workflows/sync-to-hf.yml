name: Sync to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "tamer2017usa@gmail.com"
          git config --global user.name "TAMER R DOGHEM"

          # Create orphan branch (no history) - files stay in working tree
          git checkout --orphan hf-clean
          git reset

          # Rename files for HF
          [ -f Dockerfile.hf ] && mv Dockerfile.hf Dockerfile
          [ -f README_HF.md ] && mv README_HF.md README.md

          # Add source code - each with || true so missing files don't break it
          git add src/ || true
          git add prisma/ || true
          git add public/ || true
          git add package.json || true
          git add package-lock.json || true
          git add bun.lock || true
          git add next.config.ts || true
          git add tsconfig.json || true
          git add next-env.d.ts || true
          git add tailwind.config.ts || true
          git add postcss.config.mjs || true
          git add components.json || true
          git add eslint.config.mjs || true
          git add .env.example || true
          git add .dockerignore || true
          git add entrypoint.sh || true
          git add Dockerfile || true
          git add README.md || true

          git commit -m "Deploy to HF Spaces"

          git remote add space https://Tamusa2025:$HF_TOKEN@huggingface.co/spaces/Tamusa2025/reele-video-engine
          git push space hf-clean:main --force
