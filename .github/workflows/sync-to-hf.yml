name: Sync to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "tamer2017usa@gmail.com"
          git config --global user.name "TAMER R DOGHEM"

          # Create a clean orphan branch (no history = no large files in past commits)
          git checkout --orphan hf-clean

          # Add only the files HF needs (excludes skills/, agent-ctx/, download/, db/)
          git add -A
          git reset HEAD skills/ agent-ctx/ download/ db/ 2>/dev/null || true
          git rm -r --cached skills/ agent-ctx/ download/ db/ 2>/dev/null || true

          # Rename Dockerfile.hf → Dockerfile
          if [ -f Dockerfile.hf ]; then
            mv Dockerfile.hf Dockerfile
            git add Dockerfile
          fi

          # Commit and push to HF
          git commit -m "Clean deploy for HF Spaces"

          git remote add space https://Tamusa2025:$HF_TOKEN@huggingface.co/spaces/Tamusa2025/reele-video-engine
          git push space hf-clean:main --force
