name: Sync to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "tamer2017usa@gmail.com"
          git config --global user.name "TAMER R DOGHEM"

          # Rename Dockerfile.hf → Dockerfile for HF Spaces
          if [ -f Dockerfile.hf ]; then
            mv Dockerfile.hf Dockerfile
            git add -A
            git commit -m "Use HF Dockerfile" --allow-empty
          fi

          # Remove files not needed on HF (large binaries, skills, etc.)
          git rm -r --cached skills/ agent-ctx/ download/ db/ 2>/dev/null || true
          echo "skills/" >> .gitignore
          echo "agent-ctx/" >> .gitignore
          echo "download/" >> .gitignore
          echo "db/" >> .gitignore
          git add .gitignore
          git commit -m "Exclude large files for HF deployment" --allow-empty

          # Force push — GitHub is the source of truth
          git remote add space https://Tamusa2025:$HF_TOKEN@huggingface.co/spaces/Tamusa2025/reele-video-engine
          git push space main --force
