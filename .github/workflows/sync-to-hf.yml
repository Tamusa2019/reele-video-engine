name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install --upgrade "huggingface_hub[cli]"

      - name: Verify HF_TOKEN is set
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is not set. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "HF_TOKEN is set (length: ${#HF_TOKEN})"

      - name: Sync repo to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          python3 << 'PYEOF_INNER'
          import os, sys
          from huggingface_hub import HfApi, CommitOperationAdd

          token = os.environ["HF_TOKEN"]
          repo_id = "tamusa2025/reele-video-engine"
          api = HfApi(token=token)

          # Verify space exists and token has access
          try:
              info = api.space_info(repo_id=repo_id)
              print(f"Space exists: {repo_id} (id={info.id})")
          except Exception as e:
              print(f"ERROR: cannot access space {repo_id}: {e}", file=sys.stderr)
              sys.exit(1)

          # Build commit operations: upload every file in the repo, preserving structure
          operations = []
          for root, dirs, files in os.walk("."):
              # Skip .git and other non-source dirs
              dirs[:] = [d for d in dirs if d not in (".git", "__pycache__", ".github", "node_modules", ".venv")]
              for fname in files:
                  # Skip dotfiles and workflow yaml (already on github, don't push to HF)
                  if fname.startswith(".") and fname not in (".gitignore",):
                      continue
                  if fname.endswith((".pyc", ".pyo")):
                      continue
                  local_path = os.path.join(root, fname)
                  # Normalize path: remove leading ./
                  if local_path.startswith("./"):
                      local_path = local_path[2:]
                  path_in_repo = local_path
                  operations.append(CommitOperationAdd(
                      path_in_repo=path_in_repo,
                      path_or_fileobj=local_path,
                  ))

          print(f"Uploading {len(operations)} files to {repo_id} (single commit)")
          result = api.create_commit(
              repo_id=repo_id,
              repo_type="space",
              operations=operations,
              commit_message=f"sync: from GitHub {os.environ.get('GITHUB_SHA', 'unknown')[:8]}",
          )
          print(f"SUCCESS: {result}")
          PYEOF_INNER
          echo "=== Sync complete ==="

      - name: Check Space runtime status
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          sleep 5
          curl -sS \
            -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/api/spaces/tamusa2025/reele-video-engine \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('Stage:', d.get('runtime',{}).get('stage')); print('SHA:', (d.get('sha') or '')[:8])"
