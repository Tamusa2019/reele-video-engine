name: Sync to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "tamer2017usa@gmail.com"
          git config --global user.name "TAMER R DOGHEM"

          # Create orphan branch (no history) - files stay in working tree
          git checkout --orphan hf-clean
          git reset  # unstage everything but keep files on disk

          # Rename files first
          if [ -f Dockerfile.hf ]; then
            mv Dockerfile.hf Dockerfile
          fi
          if [ -f README_HF.md ]; then
            mv README_HF.md README.md
          fi

          # Add ONLY source code (no binaries in db/, download/, upload/, skills/)
          git add \
            src/ \
            prisma/ \
            public/ \
            package.json \
            package-lock.json \
            next.config.ts \
            tsconfig.json \
            tailwind.config.ts \
            postcss.config.mjs \
            components.json \
            eslint.config.mjs \
            .env.example \
            .dockerignore \
            entrypoint.sh \
            Dockerfile \
            README.md

          git commit -m "Deploy to HF Spaces"

          git remote add space https://Tamusa2025:$HF_TOKEN@huggingface.co/spaces/Tamusa2025/reele-video-engine
          git push space hf-clean:main --force
